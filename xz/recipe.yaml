context:
  version: "5.8.2"

recipe:
  name: xz-split
  version: ${{ version }}

source:
  url: https://github.com/tukaani-project/xz/releases/download/v${{ version }}/xz-${{ version }}.tar.gz
  sha256: ce09c50a5962786b83e5da389c90dd2c15ecd0980a258dd01f70f9e7ce58a8f1
  patches:
    - prefix.patch

outputs:
  - staging:
      name: xz-split
    requirements:
      build:
        - vs
        - cmake-no-system
        - gettext-tools
      host:
        - libintl-dev
        - prefix-stub-dev
      ignore_run_exports:
        from_package:
          - libintl-dev
          - prefix-stub-dev
    build:
      script: bld.ps1

  - package:
      name: xz-runtime
    inherit:
      from: xz-split
    build:
      files:
        include:
          - Library/bin/*.dll
  - package:
      name: xz-dev
    inherit:
      from: xz-split
    build:
      files:
        include:
          - Library/include
          - Library/lib
          - Library/share/man
  - package:
      name: xz-tools
    inherit:
      from: xz-split
    requirements:
      run:
        - prefix-stub-runtime
        - libintl-runtime
        - xz-runtime
    build:
      files:
        include:
          - Library/bin/*.exe
          - Library/share/locale

about:
  license: 0BSD AND LGPL-2.1-or-later AND GPL-2.0-or-later
  license_file:
    - COPYING
    - COPYING.0BSD
    - COPYING.LGPLv2.1
    - COPYING.GPLv2
  summary: Data compression software with high compression ratio
  description: |
    XZ Utils is free general-purpose data compression software with a high
    compression ratio. XZ Utils were written for POSIX-like systems, but also
    work on some not-so-POSIX systems.
  homepage: http://tukaani.org/xz/
  repository: http://git.tukaani.org/
  documentation: http://tukaani.org/xz/

