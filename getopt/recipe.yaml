context:
  version: "2.42.0"

recipe:
  name: getopt
  version: ${{ version }}

source:
  url: https://github.com/ludvikjerabek/getopt-win/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 3d6ae295260b62af0e2bf2b0287d88e6beeb7a1f7c1f85738c6db4b33e7df13c

outputs:
  - staging:
      name: getopt-split
    requirements:
      build:
        - vs
        - cmake
    build:
      script: bld.ps1

  - package:
      name: getopt-runtime
    inherit: getopt-split
    build:
      files:
        include:
          - Library/bin
  - package:
      name: getopt-dev
    inherit: getopt-split
    build:
      files:
        include:
          - Library/include
          - Library/lib
    requirements:
      run:
        - getopt-runtime
      run_exports:
        - getopt-runtime

about:
  license: LGPL-3.0-or-later
  summary: Full getopt port for unicode and multibyte windows applications
  homepage: https://github.com/ludvikjerabek/getopt-win
